<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOOR EDITOR</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
}

header{
    background:black;
    color:gold;
    text-align:center;
    padding:15px;
}

.container{
    padding:20px;
}

.preview{
    width:100%;
    height:300px;
    background:#222;
    border-radius:10px;
    overflow:hidden;
}

video{
    width:100%;
    height:100%;
}

.tools{
    margin-top:20px;
}

button{
    background:gold;
    color:black;
    border:none;
    padding:10px 15px;
    margin:5px;
    border-radius:8px;
    cursor:pointer;
}
</style>

</head>
<body>

<header>
    <h1>NOOR EDITOR</h1>
</header>

<div class="container">

    <div class="preview">
        <video id="video" controls></video>
    </div>

    <br>

    <input type="file" id="upload" accept="video/*">

    <div class="tools">
        <button onclick="trimVideo()">Trim</button>
        <button onclick="splitVideo()">Split</button>
        <button onclick="addText()">Text</button>
        <button onclick="exportVideo()">Export</button>
    </div>

</div>

<script>
const upload = document.getElementById("upload");
const video = document.getElementById("video");

upload.addEventListener("change", () => {
    const file = upload.files[0];

    if(file){
        video.src = URL.createObjectURL(file);
    }
});

function trimVideo(){
    alert("Trim Tool Activated");
}

function splitVideo(){
    alert("Split Tool Activated");
}

function addText(){
    alert("Text Tool Activated");
}

function exportVideo(){
    alert("Export Video");
}
</script>

</body>
</html>
<script src="app.js"></script>

</body>
</html>
